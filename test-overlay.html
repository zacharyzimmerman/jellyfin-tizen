<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>OLED Overlay Test</title>
<style>
  body {
    margin: 0;
    background: #181818;
    color: #fff;
    font-family: sans-serif;
  }
  #mock-nowplaying {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    height: 100vh;
    gap: 20px;
  }
  #mock-nowplaying h2 { margin: 0; font-size: 28px; }
  #mock-nowplaying p { margin: 0; color: #aaa; font-size: 18px; }
  .progress-bar {
    width: 400px;
    height: 4px;
    background: #444;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    width: 35%;
    height: 100%;
    background: #00a4dc;
  }
</style>
</head>
<body>

<div id="mock-nowplaying">
  <div style="width:300px;height:300px;background:linear-gradient(135deg,#1a3a5a,#2a1a4a);border-radius:8px"></div>
  <h2>Test Song Title</h2>
  <p>Test Artist — Test Album</p>
  <div class="progress-bar"><div class="progress-bar-fill"></div></div>
</div>

<script>
// Replicate the exact canvas noise overlay from tizen.js
(function() {
  var overlay = document.createElement('canvas');
  overlay.id = 'tizen-oled-overlay';
  overlay.style.cssText =
    'position:fixed;top:0;left:0;width:100%;height:100%;' +
    'z-index:999999;pointer-events:none;';
  overlay.width = 64;
  overlay.height = 36;
  document.body.appendChild(overlay);

  var ctx = overlay.getContext('2d');
  var imgData = ctx.createImageData(64, 36);
  var pixels = imgData.data;

  function drawNoise() {
    for (var i = 0; i < pixels.length; i += 4) {
      pixels[i]     = Math.random() * 255 | 0;
      pixels[i + 1] = Math.random() * 255 | 0;
      pixels[i + 2] = Math.random() * 255 | 0;
      pixels[i + 3] = 10 + (Math.random() * 8 | 0); // alpha 10-17 (~4-7%)
    }
    ctx.putImageData(imgData, 0, 0);
    requestAnimationFrame(drawNoise);
  }
  drawNoise();
})();
</script>
</body>
</html>
