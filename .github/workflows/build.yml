name: Build Jellyfin Tizen

on:
  workflow_dispatch:

env:
  TIZEN_STUDIO_VER: "4.5.1"

jobs:
  build:
    name: Build .wgt package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout jellyfin-tizen
        uses: actions/checkout@v4

      - name: Checkout jellyfin-web
        uses: actions/checkout@v4
        with:
          repository: jellyfin/jellyfin-web
          ref: release-10.10.z
          path: jellyfin-web

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install expect
        run: sudo apt-get install -y expect

      - name: Install Tizen Studio
        run: |
          curl -o tizen-installer "https://download.tizen.org/sdk/Installer/tizen-studio_${TIZEN_STUDIO_VER}/web-cli_Tizen_Studio_${TIZEN_STUDIO_VER}_ubuntu-64.bin"
          chmod +x tizen-installer
          ./tizen-installer --accept-license "${GITHUB_WORKSPACE}/tizen-studio"
          rm tizen-installer

      - name: Setup Tizen Certificate
        run: |
          ${GITHUB_WORKSPACE}/tizen-studio/tools/ide/bin/tizen certificate -a Jellyfin -p 1234 -c NZ -s Auckland -ct Auckland -o Tizen -n Jellyfin -e jellyfin@example.org -f tizencert
          ${GITHUB_WORKSPACE}/tizen-studio/tools/ide/bin/tizen security-profiles add -n Jellyfin -a "${GITHUB_WORKSPACE}/tizencert.p12" -p 1234
          ${GITHUB_WORKSPACE}/tizen-studio/tools/ide/bin/tizen cli-config "profiles.path=${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml"
          chmod 755 "${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml"

      - name: Build jellyfin-web
        run: |
          cd jellyfin-web
          npm ci --no-audit
          USE_SYSTEM_FONTS=1 npm run build:production

      - name: Build jellyfin-tizen
        run: |
          JELLYFIN_WEB_DIR=jellyfin-web/dist npm ci --no-audit

      - name: Build web package
        run: |
          ${GITHUB_WORKSPACE}/tizen-studio/tools/ide/bin/tizen build-web -e ".*" -e gulpfile.babel.js -e README.md -e "node_modules/*" -e "package*.json" -e "yarn.lock" -e "jellyfin-web/*"

      - name: Fix certificate passwords
        run: |
          sed -i "s|${GITHUB_WORKSPACE}/tizencert.pwd|1234|g" ${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml
          sed -i "s|${GITHUB_WORKSPACE}/tizen-studio-data/tools/certificate-generator/certificates/distributor/tizen-distributor-signer.pwd|tizenpkcs12passfordsigner|g" ${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml
          sed -i 's|password=""|password="tizenpkcs12passfordsigner"|g' ${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml

      - name: Package .wgt
        run: |
          ${GITHUB_WORKSPACE}/tizen-studio/tools/ide/bin/tizen package -t wgt -o ${GITHUB_WORKSPACE}/output -- .buildResult

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin.wgt
          path: output/*.wgt
          retention-days: 90

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Jellyfin Tizen (screensaver fix) - Build ${{ github.run_number }}"
          files: output/*.wgt
          body: |
            Jellyfin Tizen build with screen saver suppression fix.

            Based on jellyfin-web `release-10.10.z` and jellyfin-tizen `fix/suppress-screensaver-during-playback`.

            ## Install
            1. Download `Jellyfin.wgt` below
            2. Enable Developer Mode on your Samsung TV (Apps → press 1-2-3-4-5 → enable → enter PC IP → restart TV)
            3. Use [Jellyfin2Samsung installer](https://github.com/Jellyfin2Samsung/Samsung-Jellyfin-Installer) or Tizen Studio to sideload the .wgt file
